repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.5
    hooks:
      - id: ruff
        args: [ --fix ]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.0
    hooks:
      - id: mypy
        additional_dependencies: [ types-requests ]
        pass_filenames: false
        args: [ coco/ ]

  - repo: local
    hooks:
      - id: pytest-cov
        name: pytest-cov
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
