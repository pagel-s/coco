repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [ --fix, --exit-non-zero-on-fix ]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: [ 
            "litellm", 
            "pydantic", 
            "streamlit", 
            "pandas", 
            "plotly", 
            "networkx", 
            "chromadb", 
            "typer",
            "rich",
            "pytest"
        ]
        pass_filenames: false
        args: [ --strict, src/ ]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest --cov=coco --cov-fail-under=80
        language: system
        pass_filenames: false
        always_run: true
